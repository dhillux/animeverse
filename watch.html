<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nonton Anime — AnimeVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
  <style>
    body{background:#05050e;}
    .watch-layout{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 56px);}
    @media(max-width:1100px){.watch-layout{grid-template-columns:1fr;}}
    .video-container{background:#000;display:flex;flex-direction:column;}
    .video-player-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;display:flex;align-items:center;justify-content:center;}
    .player-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:rgba(255,255,255,.4);background:linear-gradient(135deg,#0a0518,#0f0f1a);width:100%;height:100%;position:absolute;inset:0;z-index:1;}
    .player-placeholder i{font-size:5rem;color:rgba(114,80,220,.4);}
    .player-placeholder p{font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:.9rem;text-align:center;max-width:320px;}
    .player-loader{position:absolute;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;z-index:2;}
    .player-loader.show{display:flex;}
    #embedPlayer{display:none;width:100%;height:100%;border:none;background:#000;}
    #mainPlayer{display:none;width:100%;height:100%;}
    .server-row{padding:.6rem 1.25rem;background:#060610;border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
    .server-label{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);white-space:nowrap;}
    .server-btn{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;padding:.28rem .8rem;border-radius:6px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);background:transparent;cursor:pointer;transition:all .2s;}
    .server-btn:hover,.server-btn.active{background:#7250dc;border-color:#7250dc;color:#fff;}
    .sub-notice{display:inline-flex;align-items:center;gap:.4rem;font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:1px;background:rgba(114,80,220,.15);border:1px solid rgba(114,80,220,.3);color:#b09ef5;padding:.25rem .7rem;border-radius:20px;}
    .sub-notice.ok{background:rgba(46,160,67,.15);border-color:rgba(46,160,67,.3);color:#3fb950;}
    .video-info{padding:1rem 1.25rem;background:#08080e;border-top:1px solid rgba(255,255,255,.05);}
    .video-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;}
    .video-meta{font-family:'Oswald',sans-serif;font-size:.75rem;letter-spacing:.5px;color:rgba(255,255,255,.45);}
    .info-btn{font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:1px;text-transform:uppercase;padding:.32rem .9rem;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
    .info-btn:hover{border-color:#7250dc;color:#b09ef5;}
    .anime-cover-sm{width:70px;min-width:70px;border-radius:6px;overflow:hidden;flex-shrink:0;}
    .anime-cover-sm img{width:100%;display:block;object-fit:cover;min-height:95px;}
    .ep-sidebar{background:#09090f;border-left:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;max-height:calc(100vh - 56px);position:sticky;top:56px;}
    @media(max-width:1100px){.ep-sidebar{max-height:380px;position:static;}}
    .ep-sidebar-header{padding:.85rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .ep-sidebar-title{font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);}
    .ep-search{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:.3rem .7rem;color:#fff;font-size:.8rem;outline:none;transition:border-color .2s;margin:.5rem 1.1rem;width:calc(100% - 2.2rem);}
    .ep-search:focus{border-color:rgba(114,80,220,.5);}
    .ep-search::placeholder{color:rgba(255,255,255,.25);}
    .ep-list{flex:1;overflow-y:auto;padding:.4rem .6rem .6rem;scrollbar-width:thin;scrollbar-color:rgba(114,80,220,.3) transparent;}
    .ep-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .65rem;border-radius:8px;cursor:pointer;transition:background .2s;border:1px solid transparent;margin-bottom:.25rem;}
    .ep-item:hover{background:rgba(114,80,220,.1);border-color:rgba(114,80,220,.2);}
    .ep-item.active{background:rgba(114,80,220,.2);border-color:rgba(114,80,220,.4);}
    .ep-num{min-width:34px;height:34px;border-radius:6px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:600;flex-shrink:0;}
    .ep-item.active .ep-num{background:#7250dc;}
    .ep-title{font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;}
    .ep-sub{font-size:.58rem;padding:.08rem .35rem;border-radius:3px;background:rgba(114,80,220,.25);color:#b09ef5;border:1px solid rgba(114,80,220,.3);white-space:nowrap;flex-shrink:0;}
    .ep-thumb{width:56px;min-width:56px;height:36px;border-radius:4px;overflow:hidden;flex-shrink:0;}
    .ep-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .ep-thumb-ph{width:56px;height:36px;background:linear-gradient(135deg,#1a0a2e,#7250dc);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;}
    .av-loader{width:36px;height:36px;border:3px solid rgba(114,80,220,.2);border-top-color:#7250dc;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .status-note{padding:.7rem 1rem;border-radius:8px;font-family:'Oswald',sans-serif;font-size:.8rem;letter-spacing:.5px;line-height:1.6;}
    .status-note.info{background:rgba(114,80,220,.1);border:1px solid rgba(114,80,220,.25);color:#b09ef5;}
    .status-note.warn{background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2);color:#ffd166;}
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="index.html">Anime<span>Verse</span></a>
    <div id="navTitle" class="text-secondary d-none d-md-block" style="font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:1px;flex:1;padding:0 1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <a href="index.html" class="btn btn-mv-outline btn-sm"><i class="bi bi-house me-1"></i>Beranda</a>
      <a href="watchlist.html" class="btn btn-mv-outline btn-sm"><i class="bi bi-bookmark-heart me-1"></i>Watchlist</a>
    </div>
  </div>
</nav>

<div style="margin-top:56px">
  <div class="watch-layout">

    <!-- VIDEO AREA -->
    <div class="video-container">
      <div class="video-player-wrap">
        <div class="player-placeholder" id="playerPlaceholder">
          <i class="bi bi-play-circle"></i>
          <p>Pilih episode untuk mulai menonton</p>
        </div>
        <div class="player-loader" id="playerLoader">
          <div class="av-loader"></div>
          <p style="font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:.85rem;color:rgba(255,255,255,.5)">Memuat stream...</p>
        </div>
        <iframe id="embedPlayer" allowfullscreen
          allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
          sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation"></iframe>
        <video id="mainPlayer" controls crossorigin="anonymous"></video>
      </div>

      <div class="server-row">
        <span class="server-label">Server:</span>
        <div id="serverTabs" class="d-flex gap-1 flex-wrap"></div>
        <div class="ms-auto">
          <span id="subStatus" class="sub-notice"><i class="bi bi-badge-cc"></i> Sub ID</span>
        </div>
      </div>

      <div class="video-info">
        <div id="animeInfoArea">
          <div class="d-flex align-items-center gap-3 py-2">
            <div class="av-loader" style="width:20px;height:20px;border-width:2px"></div>
            <span style="font-family:'Oswald',sans-serif;font-size:.85rem;color:rgba(255,255,255,.4)">Memuat info...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- EPISODE SIDEBAR -->
    <div class="ep-sidebar">
      <div class="ep-sidebar-header">
        <span class="ep-sidebar-title"><i class="bi bi-collection-play me-2"></i>Episode</span>
        <span id="epCount" style="font-size:.72rem;color:rgba(255,255,255,.3)">—</span>
      </div>
      <input type="text" class="ep-search" id="epSearch" placeholder="Cari episode..." oninput="filterEps()">
      <div class="ep-list" id="epList">
        <div class="d-flex justify-content-center align-items-center flex-column gap-3 py-5">
          <div class="av-loader"></div>
          <span style="font-family:'Oswald',sans-serif;font-size:.8rem;color:rgba(255,255,255,.3)">Memuat episode...</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   AnimeVerse — watch.html
   
   ID FORMAT (dari index.html):
   - "one-piece"       → SPlay slug  → gunakan SPlay API
   - "jikan:21"        → Jikan MAL ID → gunakan embed player (MAL ID = 21)
   
   ALUR STREAMING:
   1. Parse ID → tentukan tipe (splay/jikan)
   2. Jika SPlay slug → coba SPlay episodes + stream
   3. Jika Jikan → langsung embed player dengan MAL ID
   4. Embed player selalu jadi fallback
══════════════════════════════════════════════════════════════ */

const SPLAY_BASE = 'https://api.splay.id';
const SPLAY_KEY  = 'sk_live_2355bb1f4e3cca896b15f6a740e377af95bcc4ad114833f7';
const JIKAN_BASE = 'https://api.jikan.moe/v4';

const splayFetch = (path) => fetch(`${SPLAY_BASE}${path}`, {
  headers: { 'Authorization': `Bearer ${SPLAY_KEY}` }
});

/* ── PARSE URL PARAMS ── */
const urlParams = new URLSearchParams(location.search);
const RAW_ID    = decodeURIComponent(urlParams.get('id') || '');
const TITLE     = decodeURIComponent(urlParams.get('title') || 'Anime');

// Determine ID type
const IS_JIKAN  = RAW_ID.startsWith('jikan:');
const SPLAY_ID  = IS_JIKAN ? null : RAW_ID;          // SPlay slug, e.g. "one-piece"
const MAL_ID    = IS_JIKAN ? RAW_ID.replace('jikan:','') : null; // MAL ID number

/* ── EMBED SERVERS (pakai MAL ID — semua server ini accept MAL ID) ── */
const EMBED_SERVERS = [
  { label:'🟣 Server 1', getUrl:(malId,ep)=>`https://vidsrc.to/embed/anime/${malId}/${ep}`, hasSub:true  },
  { label:'🔵 Server 2', getUrl:(malId,ep)=>`https://vidsrc.me/embed/anime/${malId}/${ep}`, hasSub:true  },
  { label:'🟢 Server 3', getUrl:(malId,ep)=>`https://vidsrc.in/embed/anime?malId=${malId}&ep=${ep}`, hasSub:true  },
  { label:'🟡 Server 4', getUrl:(malId,ep)=>`https://anime.nexplay.it/?malid=${malId}&ep=${ep}`, hasSub:true  },
  { label:'🟠 Server 5', getUrl:(malId,ep)=>`https://player.smashy.stream/anime/${malId}?ep=${ep}`, hasSub:false }
];

let allEpisodes = [], filteredEps = [], currentEpNum = null, hls = null;

/* ── INIT ── */
document.title = `${TITLE} — AnimeVerse`;
document.getElementById('navTitle').textContent = TITLE;

async function init() {
  if (!RAW_ID) {
    showEpError('ID anime tidak ditemukan. <a href="index.html">Kembali ke beranda</a>.');
    document.getElementById('animeInfoArea').innerHTML = '<p class="text-secondary">ID tidak ada.</p>';
    return;
  }

  if (IS_JIKAN) {
    // Jikan mode: fetch info dari Jikan, episode list dari Jikan, stream via embed
    await Promise.all([loadJikanInfo(), loadJikanEpisodes()]);
  } else {
    // SPlay mode: fetch info + episodes dari SPlay
    await Promise.all([loadSPlayInfo(), loadSPlayEpisodes()]);
  }
}

/* ════════ SPLAY MODE ════════ */
async function loadSPlayInfo() {
  try {
    const res = await splayFetch(`/api/anime/${SPLAY_ID}`);
    if (!res.ok) throw new Error(`SPlay ${res.status}`);
    const raw = await res.json();
    const a = raw.data || raw;
    renderAnimeInfo({
      name: a.name || TITLE,
      cover_url: a.cover_url || '',
      score: a.anilist_data?.averageScore,
      eps: a.available_episodes || 0,
      status: a.anilist_data?.status || '',
      country: a.anilist_data?.countryOfOrigin || '',
      hasSub: a.has_subtitle_id,
      id: SPLAY_ID
    });
  } catch(e) {
    console.warn('SPlay info gagal:', e.message);
    document.getElementById('animeInfoArea').innerHTML = `<div class="video-title">${TITLE}</div>`;
  }
}

async function loadSPlayEpisodes() {
  try {
    const res = await splayFetch(`/api/anime/${SPLAY_ID}/episodes?per_page=100`);
    if (!res.ok) throw new Error(`SPlay episodes ${res.status}`);
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.data || []);
    if (!list.length) throw new Error('Kosong');

    allEpisodes = list.map(ep => ({
      num: ep.episode_number || ep.number || ep.num || 1,
      title: ep.title || ep.name || `Episode ${ep.episode_number || ep.number}`,
      thumb: ep.thumbnail_url || ep.thumbnail || '',
      hasSub: ep.has_subtitle_id || false,
      source: 'splay'
    }));

    filteredEps = allEpisodes;
    document.getElementById('epCount').textContent = `${allEpisodes.length} Ep`;
    renderEpList(allEpisodes);

    // Auto-play ep 1
    if (allEpisodes.length) playEp(allEpisodes[0].num);

  } catch(e) {
    console.warn('SPlay episodes gagal:', e.message, '— fallback ke embed dengan MAL ID');
    // SPlay episode list gagal → tampilkan embed player saja dengan pesan
    showEpError(`<div class="status-note info mb-2"><i class="bi bi-info-circle me-2"></i>SPlay tidak dapat dijangkau (${e.message}). Masukkan nomor episode manual:</div>
      <div class="d-flex gap-2 mt-2 px-1">
        <input id="manualEp" type="number" min="1" value="1" class="ep-search" style="width:80px;margin:0">
        <button onclick="playEmbedManual()" class="server-btn active" style="flex:1">▶ Tonton</button>
      </div>`);
    // Coba load episode count dari Jikan sebagai info
    if (MAL_ID || /^\d+$/.test(SPLAY_ID)) {
      const mid = MAL_ID || SPLAY_ID;
      try {
        const r = await fetch(`${JIKAN_BASE}/anime/${mid}`);
        if (r.ok) {
          const d = await r.json();
          const eps = d.data?.episodes || 12;
          allEpisodes = Array.from({length:eps},(_,i)=>({num:i+1,title:`Episode ${i+1}`,thumb:'',hasSub:false,source:'embed'}));
          filteredEps = allEpisodes;
          document.getElementById('epCount').textContent = `${eps} Ep`;
          renderEpList(allEpisodes);
          if (allEpisodes.length) playEp(1);
        }
      } catch(ex) {}
    }
  }
}

function playEmbedManual() {
  const ep = parseInt(document.getElementById('manualEp')?.value || 1);
  playEp(ep);
}

/* ════════ JIKAN MODE ════════ */
async function loadJikanInfo() {
  try {
    const res = await fetch(`${JIKAN_BASE}/anime/${MAL_ID}/full`);
    if (!res.ok) throw new Error(`Jikan ${res.status}`);
    const jd = (await res.json()).data;
    renderAnimeInfo({
      name: jd.title_english || jd.title || TITLE,
      cover_url: jd.images?.jpg?.large_image_url || '',
      score: jd.score ? Math.round(jd.score*10) : null,
      eps: jd.episodes || 0,
      status: jd.status === 'Currently Airing' ? 'RELEASING' : 'FINISHED',
      country: 'JP',
      hasSub: false,
      id: RAW_ID
    });
  } catch(e) {
    document.getElementById('animeInfoArea').innerHTML = `<div class="video-title">${TITLE}</div>`;
  }
}

async function loadJikanEpisodes() {
  try {
    // Get total count
    let totalEps = 12;
    try {
      const r = await fetch(`${JIKAN_BASE}/anime/${MAL_ID}`);
      if (r.ok) { const d = await r.json(); totalEps = d.data?.episodes || 12; }
    } catch(e) {}

    // Fetch episode titles
    const r2 = await fetch(`${JIKAN_BASE}/anime/${MAL_ID}/episodes`);
    let epTitles = {};
    if (r2.ok) {
      const d2 = await r2.json();
      (d2.data||[]).forEach(ep => { epTitles[ep.mal_id] = ep.title || ep.title_romanji; });
    }

    allEpisodes = Array.from({length:totalEps},(_,i)=>({
      num: i+1,
      title: epTitles[i+1] || `Episode ${i+1}`,
      thumb: '',
      hasSub: false,
      source: 'jikan'
    }));

    filteredEps = allEpisodes;
    document.getElementById('epCount').textContent = `${totalEps} Ep`;
    renderEpList(allEpisodes);
    if (allEpisodes.length) playEp(1);

  } catch(e) {
    showEpError(`Gagal memuat episode: ${e.message}`);
  }
}

/* ════════ SHARED RENDER ════════ */
function renderAnimeInfo(a) {
  const originMap = {JP:'🇯🇵',CN:'🇨🇳',KR:'🇰🇷'};
  document.title = `${a.name} — AnimeVerse`;
  document.getElementById('navTitle').textContent = a.name;
  document.getElementById('animeInfoArea').innerHTML = `
    <div class="d-flex gap-3 align-items-start flex-wrap">
      ${a.cover_url?`<div class="anime-cover-sm"><img src="${a.cover_url}" alt="${a.name}"></div>`:''}
      <div style="flex:1;min-width:180px">
        <div class="video-title mb-1">${a.name}</div>
        <div class="video-meta mb-2">${originMap[a.country]||'🌐'} ${a.country} · ${a.eps?a.eps+' Ep':'Ongoing'} · ${a.status}${a.hasSub?' · <span style="color:#b09ef5">Sub ID</span>':''}</div>
        ${a.score?`<div style="font-family:'Oswald',sans-serif;font-size:.8rem;color:#ffd166;margin-bottom:.6rem">⭐ ${(a.score/10).toFixed(1)} / 10</div>`:''}
        <div class="d-flex gap-2 flex-wrap">
          <a href="index.html?id=${encodeURIComponent(a.id)}" class="info-btn"><i class="bi bi-info-circle"></i>Detail</a>
          <button onclick="saveToWL(${JSON.stringify(a).replace(/"/g,'&quot;')})" class="info-btn"><i class="bi bi-bookmark-plus"></i>Watchlist</button>
          <a href="history.html" class="info-btn"><i class="bi bi-clock-history"></i>Riwayat</a>
        </div>
      </div>
    </div>`;
}

/* ════════ PLAY EPISODE ════════ */
async function playEp(epNum) {
  // Highlight sidebar
  document.querySelectorAll('.ep-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById(`ep-${epNum}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  currentEpNum = epNum;

  showPlayerLoader(true);
  document.getElementById('serverTabs').innerHTML = '';
  setSubStatus('loading');

  if (IS_JIKAN) {
    // Jikan mode: langsung embed player dengan MAL ID
    loadEmbedPlayer(MAL_ID, epNum, 0);
    saveHistory();
    return;
  }

  // SPlay mode: coba SPlay stream, fallback embed
  try {
    const res = await splayFetch(`/api/anime/${SPLAY_ID}/episodes/${epNum}`);
    if (!res.ok) throw new Error(`SPlay stream ${res.status}`);
    const data = await res.json();
    const ep = data.data || data;

    // Parse sources
    let sources = [];
    if (ep.qualities && typeof ep.qualities === 'object') {
      sources = Object.entries(ep.qualities).map(([q,url])=>({quality:q,url,type:url.includes('.m3u8')?'hls':'mp4'}));
    } else if (ep.video_url) {
      sources = [{quality:'Auto',url:ep.video_url,type:ep.video_url.includes('.m3u8')?'hls':'mp4'}];
    } else if (Array.isArray(ep.sources)) {
      sources = ep.sources;
    }

    const subs = ep.subtitle_tracks || ep.subtitles ||
      (ep.subtitle_url ? [{url:ep.subtitle_url,language:'id',label:'Indonesia'}] : []);

    if (!sources.length) throw new Error('Tidak ada sumber video');

    // Render server tabs (SPlay HLS)
    const tabs = document.getElementById('serverTabs');
    sources.forEach((src,i) => {
      const btn = document.createElement('button');
      btn.className = `server-btn${i===0?' active':''}`;
      btn.style.cssText = 'border-color:rgba(114,80,220,.5);color:#b09ef5;';
      btn.textContent = `⚡ ${src.quality||'HLS'}`;
      btn.onclick = () => {
        document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('embedPlayer').style.display='none';
        document.getElementById('embedPlayer').src='';
        showPlayerLoader(true);
        playSrc(src);
      };
      tabs.appendChild(btn);
    });

    // Handle subtitles
    const idSub = subs.find(s=>(s.language||s.lang||'').toLowerCase()==='id'||(s.label||'').toLowerCase().includes('indo'));
    if (subs.length) {
      const player = document.getElementById('mainPlayer');
      while(player.firstChild) player.removeChild(player.firstChild);
      subs.forEach(sub => {
        const track = document.createElement('track');
        track.kind = 'subtitles';
        track.label = sub.label||sub.language||'Sub';
        track.srclang = sub.language||'id';
        track.src = sub.url||sub.file||'';
        if (sub===idSub) { track.default=true; }
        player.appendChild(track);
      });
    }
    setSubStatus(idSub?'ok':subs.length?'available':'none');

    // Play best source (prefer HLS)
    const hlsSrc = sources.find(s=>s.type==='hls'||s.url?.includes('.m3u8')) || sources[0];
    await playSrc(hlsSrc);
    saveHistory();

  } catch(e) {
    console.warn('SPlay stream gagal:', e.message, '→ embed fallback');
    // Embed fallback — gunakan MAL ID jika tersedia, atau coba SPLAY_ID
    const embedId = MAL_ID || SPLAY_ID;
    loadEmbedPlayer(embedId, epNum, 0);
    setSubStatus('available');
    saveHistory();
  }
}

/* ════════ EMBED PLAYER ════════ */
function loadEmbedPlayer(malOrId, epNum, serverIdx) {
  const server = EMBED_SERVERS[serverIdx] || EMBED_SERVERS[0];
  const url = server.getUrl(malOrId, epNum);

  const embed = document.getElementById('embedPlayer');
  const video = document.getElementById('mainPlayer');
  const ph = document.getElementById('playerPlaceholder');

  video.style.display = 'none';
  ph.style.display = 'none';
  embed.src = url;
  embed.style.display = 'block';
  showPlayerLoader(false);
  if (server.hasSub) setSubStatus('ok');

  // Render server tabs
  const tabs = document.getElementById('serverTabs');
  if (!tabs.children.length) {
    EMBED_SERVERS.forEach((s,i) => {
      const btn = document.createElement('button');
      btn.className = `server-btn${i===serverIdx?' active':''}`;
      btn.textContent = s.label;
      btn.onclick = () => {
        document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        loadEmbedPlayer(malOrId, currentEpNum, i);
      };
      tabs.appendChild(btn);
    });
  } else {
    document.querySelectorAll('.server-btn').forEach((b,i)=>b.classList.toggle('active',i===serverIdx));
  }
}

/* ════════ HLS.JS PLAYER ════════ */
async function playSrc(source) {
  const player = document.getElementById('mainPlayer');
  const embed  = document.getElementById('embedPlayer');
  const ph     = document.getElementById('playerPlaceholder');

  if (hls) { hls.destroy(); hls = null; }
  embed.style.display = 'none'; embed.src = '';

  const url = source.url || source.src || '';
  const isHLS = source.type==='hls' || url.includes('.m3u8');

  if (isHLS && Hls.isSupported()) {
    hls = new Hls({ maxBufferLength:30 });
    hls.loadSource(url);
    hls.attachMedia(player);
    await new Promise((res,rej) => {
      hls.on(Hls.Events.MANIFEST_PARSED, res);
      hls.on(Hls.Events.ERROR, (e,d) => { if(d.fatal) rej(new Error('HLS error: '+d.type)); });
      setTimeout(()=>rej(new Error('HLS timeout')), 12000);
    });
  } else {
    player.src = url;
  }
  ph.style.display='none';
  player.style.display='block';
  showPlayerLoader(false);
  player.play().catch(()=>{});
}

/* ════════ EPISODE LIST ════════ */
function renderEpList(eps) {
  const list = document.getElementById('epList');
  if (!eps.length) { list.innerHTML=`<div class="p-3"><div class="status-note warn">Tidak ada episode.</div></div>`; return; }
  list.innerHTML = eps.map(ep=>`
    <div class="ep-item${ep.num===currentEpNum?' active':''}" id="ep-${ep.num}" onclick="playEp(${ep.num})">
      ${ep.thumb?`<div class="ep-thumb"><img src="${ep.thumb}" loading="lazy" alt=""></div>`:`<div class="ep-thumb-ph">▶</div>`}
      <div class="ep-num">${ep.num}</div>
      <div class="ep-title" title="${ep.title}">${ep.title}</div>
      ${ep.hasSub?`<span class="ep-sub">SUB ID</span>`:''}
    </div>`).join('');
}

function filterEps() {
  const q = document.getElementById('epSearch').value.toLowerCase().trim();
  filteredEps = q ? allEpisodes.filter(ep=>ep.title.toLowerCase().includes(q)||String(ep.num).includes(q)) : allEpisodes;
  renderEpList(filteredEps);
  if (currentEpNum) { const el=document.getElementById(`ep-${currentEpNum}`); if(el)el.classList.add('active'); }
}

/* ════════ UI HELPERS ════════ */
function showPlayerLoader(show) { document.getElementById('playerLoader').classList.toggle('show',show); }

function setSubStatus(state) {
  const el = document.getElementById('subStatus');
  const s = {
    loading: ['sub-notice',     '<i class="bi bi-badge-cc"></i> Sub ID: Memeriksa...'],
    ok:      ['sub-notice ok',  '<i class="bi bi-badge-cc-fill"></i> Sub Indonesia ✓'],
    available:['sub-notice',    '<i class="bi bi-badge-cc"></i> Subtitle Tersedia'],
    none:    ['sub-notice',     '<i class="bi bi-badge-cc"></i> Tanpa Subtitle']
  }[state] || ['sub-notice','—'];
  el.className = s[0]; el.innerHTML = s[1];
  el.style.opacity = state==='none'?'.5':'1';
}

function showEpError(html) {
  document.getElementById('epList').innerHTML = `<div class="p-3">${html}</div>`;
}

/* ════════ WATCHLIST / HISTORY ════════ */
function saveToWL(a) {
  try {
    let list = JSON.parse(localStorage.getItem('av_watchlist')||'[]');
    if (!list.some(x=>x.id===a.id)) {
      list.unshift({id:a.id,name:a.name,cover_url:a.cover_url,score:a.score,saved_at:new Date().toISOString()});
      localStorage.setItem('av_watchlist',JSON.stringify(list));
      alert('✅ Ditambahkan ke watchlist!');
    } else { alert('⭐ Sudah ada di watchlist.'); }
  } catch(e) {}
}

function saveHistory() {
  try {
    let h = JSON.parse(localStorage.getItem('av_history')||'[]');
    const id = RAW_ID, title = TITLE;
    h = h.filter(x=>x.id!==id);
    h.unshift({id,title,ep_num:currentEpNum,viewed_at:new Date().toISOString()});
    localStorage.setItem('av_history',JSON.stringify(h.slice(0,50)));
  } catch(e) {}
}

/* ════════ START ════════ */
init();
</script>
