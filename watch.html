<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nonton Anime — AnimeVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <link href="css/style.css" rel="stylesheet"/>
  <style>
    body { background: #05050e; }

    /* ── LAYOUT ── */
    .watch-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: calc(100vh - 56px);
    }
    @media(max-width:1100px) { .watch-layout { grid-template-columns: 1fr; } }

    /* ── VIDEO AREA ── */
    .video-container { background: #000; display: flex; flex-direction: column; }
    .video-player-wrap {
      width: 100%; aspect-ratio: 16/9;
      background: #000; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    #mainPlayer { width: 100%; height: 100%; background: #000; display: none; }
    .player-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1rem; color: rgba(255,255,255,.4);
      background: linear-gradient(135deg, #0a0518, #0f0f1a);
      width: 100%; height: 100%; position: absolute; inset: 0; z-index: 1;
    }
    .player-placeholder i { font-size: 5rem; color: rgba(114,80,220,.4); }
    .player-placeholder p { font-family: 'Oswald', sans-serif; letter-spacing: 1px; font-size: .9rem; text-align: center; max-width: 320px; }
    .player-loader {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.75);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
    }
    .player-loader.show { display: flex; }

    /* ── SERVER TABS ── */
    .server-row {
      padding: .6rem 1.25rem; background: #060610;
      border-top: 1px solid rgba(255,255,255,.04);
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .server-label { font-family:'Oswald',sans-serif; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.35); white-space:nowrap; }
    .server-btn {
      font-family:'Oswald',sans-serif; font-size:.7rem; letter-spacing:1px; text-transform:uppercase;
      padding:.28rem .8rem; border-radius:6px;
      border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.5);
      background:transparent; cursor:pointer; transition:all .2s;

    .server-btn:hover, .server-btn.active { background:#7250dc; border-color:#7250dc; color:#fff; }
    .server-btn.active-sub { background:rgba(114,80,220,.25); border-color:rgba(114,80,220,.5); color:#b09ef5; }

    /* ── SUBTITLE NOTICE ── */
    .sub-notice {
      display: inline-flex; align-items: center; gap: .4rem;
      font-family:'Oswald',sans-serif; font-size:.72rem; letter-spacing:1px;
      background:rgba(114,80,220,.15); border:1px solid rgba(114,80,220,.3);
      color:#b09ef5; padding:.25rem .7rem; border-radius:20px;
    }
    .sub-notice.active { background:rgba(46,160,67,.15); border-color:rgba(46,160,67,.3); color:#3fb950; }

    /* ── ANIME INFO BAR ── */
    .video-info { padding: 1rem 1.25rem; background: #08080e; border-top: 1px solid rgba(255,255,255,.05); }
    .video-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; }

    .info-action-btn {
      font-family:'Oswald',sans-serif; font-size:.72rem; letter-spacing:1px; text-transform:uppercase;
      padding:.32rem .9rem; border-radius:6px; border:1px solid rgba(255,255,255,.12);

    .info-action-btn:hover { border-color:#7250dc; color:#b09ef5; }
    .anime-cover-side { width:70px; min-width:70px; border-radius:6px; overflow:hidden; flex-shrink:0; }
    .anime-cover-side img { width:100%; display:block; object-fit:cover; min-height:95px; }

    /* ── EPISODE SIDEBAR ── */
    .ep-sidebar {
      background: #09090f; border-left: 1px solid rgba(255,255,255,.05);
      display: flex; flex-direction: column; max-height: calc(100vh - 56px);
      position: sticky; top: 56px;

    @media(max-width:1100px) { .ep-sidebar { max-height: 380px; position: static; } }
    .ep-sidebar-header {
      padding: .85rem 1.1rem; border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .ep-sidebar-title { font-family:'Oswald',sans-serif; font-size:.78rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.5); }
    .ep-search {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
      border-radius:6px; padding:.3rem .7rem; color:#fff; font-size:.8rem;
      width:100%; outline:none; transition:border-color .2s; margin:.5rem 1.1rem; width:calc(100% - 2.2rem);
    }
    .ep-search:focus { border-color:rgba(114,80,220,.5); }
    .ep-search::placeholder { color:rgba(255,255,255,.25); }
    .ep-list {
      flex: 1; overflow-y: auto; padding: .4rem .6rem .6rem;
      scrollbar-width: thin; scrollbar-color: rgba(114,80,220,.3) transparent;
    }
    .ep-item {
      display: flex; align-items: center; gap: .65rem;
      padding: .55rem .65rem; border-radius: 8px; cursor: pointer;
      transition: background .2s; border: 1px solid transparent; margin-bottom: .25rem;
    }
    .ep-item:hover { background: rgba(114,80,220,.1); border-color: rgba(114,80,220,.2); }
    .ep-item.active { background: rgba(114,80,220,.2); border-color: rgba(114,80,220,.4); }
    .ep-num {
      min-width: 34px; height: 34px; border-radius: 6px;
      background: rgba(255,255,255,.06); display: flex; align-items: center;
      justify-content: center; font-family:'Oswald',sans-serif; font-size:.78rem;
      font-weight:600; flex-shrink:0;
    }
    .ep-item.active .ep-num { background: #7250dc; }
    .ep-title { font-family:'Oswald',sans-serif; font-size:.8rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; flex:1; }
    .ep-sub-badge { font-size:.58rem; padding:.08rem .35rem; border-radius:3px; background:rgba(114,80,220,.25); color:#b09ef5; border:1px solid rgba(114,80,220,.3); white-space:nowrap; flex-shrink:0; }
    .ep-play-icon { margin-left:auto; color:rgba(114,80,220,.5); font-size:.78rem; flex-shrink:0; }

    /* ── LOADER ── */
    .av-loader { width:36px; height:36px; border:3px solid rgba(114,80,220,.2); border-top-color:#7250dc; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── STATUS NOTES ── */
    .status-note {
      padding:.7rem 1rem; border-radius:8px;
      font-family:'Oswald',sans-serif; font-size:.8rem; letter-spacing:.5px; line-height:1.6;
    }
    .status-note.info { background:rgba(114,80,220,.1); border:1px solid rgba(114,80,220,.25); color:#b09ef5; }
    .status-note.warn { background:rgba(255,209,102,.08); border:1px solid rgba(255,209,102,.2); color:#ffd166; }
    .status-note.err  { background:rgba(230,57,70,.08); border:1px solid rgba(230,57,70,.2); color:#f87171; }

    /* ── THUMBNAIL ── */
    .ep-thumb { width:56px; min-width:56px; height:36px; border-radius:4px; overflow:hidden; flex-shrink:0; }
    .ep-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .ep-thumb-placeholder { width:56px; height:36px; background:linear-gradient(135deg,#1a0a2e,#7250dc); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:.8rem; flex-shrink:0; }
  </style>

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
/* ════════════════════════════════════════════════════
   AnimeVerse Watch Page
   Streaming: SPlay API (hub.splay.id) — pakai API key kamu
   Data:      Jikan API (MyAnimeList) — fallback info anime
════════════════════════════════════════════════════ */
const SPLAY_BASE = 'https://api.splay.id';
const SPLAY_KEY  = 'sk_live_2355bb1f4e3cca896b15f6a740e377af95bcc4ad114833f7';
const JIKAN_BASE = 'https://api.jikan.moe/v4';

const splayFetch = (path) => fetch(`${SPLAY_BASE}${path}`, {
  headers: { 'Authorization': `Bearer ${SPLAY_KEY}` }
});

// Cache slug SPlay supaya tidak fetch ulang
const slugCache = {};

/* ── CARI SLUG SPLAY dari judul anime ── */
async function getSplaySlug(title, malId) {
  const cacheKey = malId || title;
  if (slugCache[cacheKey]) return slugCache[cacheKey];

  try {
    // Per SPlay docs: GET /api/anime/search?q=naruto&per_page=5
    const cleanTitle = title.replace(/Season \d+|Part \d+/gi, '').trim();
    const res = await splayFetch(`/api/anime/search?q=${encodeURIComponent(cleanTitle)}&per_page=5`);
    if (!res.ok) throw new Error(`Search HTTP ${res.status}`);
    const data = await res.json();
    // Response: { data: [...], meta: {...} }
    const list = Array.isArray(data) ? data : (data.data || []);
    if (!list.length) throw new Error('Tidak ada hasil di SPlay');

    // SPlay ID is a string slug: "one-piece", "frieren-beyond-journeys-end"
    const best = list[0];
    const slug = best.id || best.slug;
    if (!slug) throw new Error('Slug tidak ditemukan');
    slugCache[cacheKey] = slug;
    console.log(`✅ SPlay slug: "${slug}" (search: "${cleanTitle}")`);
    return slug;
  } catch(e) {
    // 403 = domain belum di-whitelist di hub.splay.id/dashboard
    return null;
  }
}

// Jikan: fallback untuk info anime (pakai MAL ID jika numerik)
async function jikanAnimeInfo() {
  if (!/^\d+$/.test(ANIME_ID)) return null;
  const res = await fetch(`${JIKAN_BASE}/anime/${ANIME_ID}/full`);
  if (!res.ok) throw new Error(`Jikan ${res.status}`);
  const jd = (await res.json()).data;
  return {
    id: ANIME_ID, name: jd.title_english || jd.title,
    cover_url: jd.images?.jpg?.large_image_url || '',
    available_episodes: jd.episodes || 0,
    anilist_data: {
      averageScore: jd.score ? Math.round(jd.score * 10) : null,
      status: jd.status === 'Currently Airing' ? 'RELEASING' : 'FINISHED',
      countryOfOrigin: 'JP',
      genres: (jd.genres || []).map(g => g.name),
      description: jd.synopsis,
      seasonYear: jd.year, season: jd.season, format: jd.type,
      studios: (jd.studios || []).map(s => s.name)
    }
  };
}

const params  = new URLSearchParams(location.search);
const ANIME_ID = params.get('id') || '';
const TITLE    = decodeURIComponent(params.get('title') || 'Anime');

let allEpisodes  = [];
let filteredEps  = [];
let currentEpNum = null;
let currentSources = [];
let currentSubs  = [];
let hls = null;

/* ── INIT ── */
document.title = `${TITLE} — AnimeVerse`;
document.getElementById('navTitle').textContent = TITLE;

async function init() {
  if (!ANIME_ID) {
    showEpError('Tidak ada ID anime. Kembali ke <a href="index.html">beranda</a>.');
    document.getElementById('animeInfoArea').innerHTML = `<p class="text-secondary">ID anime tidak ditemukan.</p>`;
    return;
  }
  await Promise.all([loadAnimeInfo(), loadEpisodes()]);
}

/* ── ANIME INFO ── */
async function loadAnimeInfo() {
  try {
    let a;

    // Coba SPlay dulu untuk data lengkap
    try {
      const slug = await getSplaySlug(TITLE, ANIME_ID);
      if (slug) {
        // Per docs: GET /api/anime/{id} → detail with AniList metadata
        const res = await splayFetch(`/api/anime/${slug}`);
        if (res.ok) {
          const raw = await res.json();
          a = raw.data || raw;
          console.log('✅ Info dari SPlay:', slug);
        }
      }
    } catch(eSplay) {
      console.warn('SPlay info gagal, pakai Jikan:', eSplay.message);
    }

    // Fallback Jikan
    if (!a) {
      a = await jikanAnimeInfo();
      if (!a) throw new Error('Tidak ada data anime');
      console.log('📡 Info dari Jikan');
    }

    const title   = a.name || TITLE;
    const score   = a.anilist_data?.averageScore;
    const status  = a.anilist_data?.status || '';
    const country = a.anilist_data?.countryOfOrigin || '';
    const eps     = a.available_episodes || 0;
    const hasSub  = a.has_subtitle_id || a.subtitle_languages?.includes('id');
    const originMap = { JP: '🇯🇵', CN: '🇨🇳', KR: '🇰🇷' };
    const flag = originMap[country] || '🌐';

    document.title = `${title} — AnimeVerse`;
    document.getElementById('navTitle').textContent = title;

    document.getElementById('animeInfoArea').innerHTML = `
      <div class="d-flex gap-3 align-items-start flex-wrap">
        ${a.cover_url ? `<div class="anime-cover-side"><img src="${a.cover_url}" alt="${title}"></div>` : ''}
        <div style="flex:1;min-width:180px">
          <div class="video-title mb-1">${title}</div>
          <div class="video-meta mb-2">${flag} ${country} · ${eps ? eps+' Ep' : 'Ongoing'} · ${status}${hasSub ? ' · <span style="color:#b09ef5">Sub ID</span>' : ''}</div>
          ${score ? `<div style="font-family:'Oswald',sans-serif;font-size:.8rem;color:#ffd166;margin-bottom:.6rem">⭐ ${(score/10).toFixed(1)} / 10</div>` : ''}
          <div class="d-flex gap-2 flex-wrap">
            <a href="index.html?id=${ANIME_ID}" class="info-action-btn"><i class="bi bi-info-circle"></i>Detail</a>
            <button onclick="saveWatchlist(${JSON.stringify(a).replace(/"/g,'&quot;')})" class="info-action-btn"><i class="bi bi-bookmark-plus"></i>Watchlist</button>
            <a href="history.html" class="info-action-btn"><i class="bi bi-clock-history"></i>Riwayat</a>
          </div>
        </div>
      </div>`;

  } catch(e) {
    document.getElementById('animeInfoArea').innerHTML = `
      <div class="video-title">${TITLE}</div>
      <div class="video-meta text-danger">Gagal memuat info: ${e.message}</div>`;
  }
}

/* ── JIKAN EPISODES ── */
async function jikanEpisodes(malId) {
  if (!/^\d+$/.test(malId)) {
    // Non-numeric ID → create fake episode list based on anime detail
    return generateEpisodeList(malId);
  }

  // Get total episode count from anime detail first
  let totalEps = 0;
  try {
    const detailRes = await fetch(`${JIKAN_BASE}/anime/${malId}`);
    if (detailRes.ok) {
      const det = await detailRes.json();
      totalEps = det.data?.episodes || 0;
    }
  } catch(e) {}

  // Fetch episode list (paginated, max 100 per page)
  let allEps = [];
  let page = 1;
  while (true) {
    try {
      const res = await fetch(`${JIKAN_BASE}/anime/${malId}/episodes?page=${page}`);
      if (!res.ok) break;
      const data = await res.json();
      const eps = data.data || [];
      if (!eps.length) break;

      allEps = [...allEps, ...eps.map(ep => ({
        episode_number: ep.mal_id,
        number: ep.mal_id,
        title: ep.title || ep.title_romanji || `Episode ${ep.mal_id}`,
        thumbnail_url: ep.images?.jpg?.image_url || null,
        has_subtitle_id: false,
        subtitle_tracks: []
      }))];

      // Check if there are more pages
      if (!data.pagination?.has_next_page || page >= 5) break;
      page++;
      await new Promise(r => setTimeout(r, 350)); // Jikan rate limit
    } catch(e) { break; }
  }

  // If Jikan has no episode list (some anime lack it), generate from total count
  if (!allEps.length && totalEps > 0) {
    allEps = Array.from({ length: totalEps }, (_, i) => ({
      episode_number: i + 1, number: i + 1,
      title: `Episode ${i + 1}`, thumbnail_url: null,
      has_subtitle_id: false, subtitle_tracks: []
    }));
  }

  return allEps;
}

// Generate episode list when we only know the count (no Jikan episode data)
async function generateEpisodeList(animeId) {
  return Array.from({ length: 12 }, (_, i) => ({
    episode_number: i + 1, number: i + 1,
    title: `Episode ${i + 1}`, thumbnail_url: null,
    has_subtitle_id: false, subtitle_tracks: []
  }));
}

/* ── EPISODE LIST ── */
async function loadEpisodes() {
  try {
    let allEps = [];

    // 1. Coba SPlay episode list dulu (punya thumbnail + subtitle info)
    try {
      const slug = await getSplaySlug(TITLE, ANIME_ID);
      if (slug) {
        const res = await splayFetch(`/api/anime/${slug}/episodes?page=1&per_page=100`);
        if (res.ok) {
          const data = await res.json();
          const list = Array.isArray(data) ? data : (data.data || []);
          if (list.length) {
            allEps = list;
            console.log(`✅ Episode dari SPlay: ${allEps.length} ep`);
          }
        } else if (res.status === 403) {
          console.info('ℹ️ SPlay: domain belum di-whitelist. Whitelist di hub.splay.id/dashboard');
        }
      }
    } catch(eSplay) {
      // Silent fail — embed player tetap aktif
    }

    // 2. Jika SPlay kosong → Jikan fallback
    if (!allEps.length) {
      try {
        allEps = await jikanEpisodes(ANIME_ID);
        console.log(`📡 Episode dari Jikan: ${allEps.length} ep`);
      } catch(e) {
        console.warn('Jikan episodes error:', e.message);
      }
    }

    allEpisodes = allEps;
    filteredEps = allEps;

    if (!allEps.length) {
      showEpError('Episode belum tersedia untuk anime ini di SPlay maupun Jikan.');
      return;
    }

    document.getElementById('epCount').textContent = `${allEps.length} Ep`;
    renderEpisodeList(allEps);

    // Auto-play first episode (embed player always works)
    if (allEps.length > 0) {
      const firstEp = allEps[0];
      const firstNum = firstEp.episode_number || firstEp.number || 1;
      playEpisode(firstNum);
    }

  } catch(e) {
    showEpError(`Gagal memuat episode: ${e.message}`);
  }
}

/* ── RENDER EPISODE LIST ── */
function renderEpisodeList(eps) {
  const epList = document.getElementById('epList');
  if (!eps.length) {
    epList.innerHTML = `<div class="p-3"><div class="status-note warn">Tidak ada episode yang cocok.</div></div>`;
    return;
  }

  epList.innerHTML = eps.map(ep => {
    const num   = ep.episode_number || ep.number || ep.id;
    const title = ep.title || ep.name || `Episode ${num}`;
    const hasSub = ep.has_subtitle_id || (ep.subtitle_tracks || []).some(s => s.language === 'id' || s.lang === 'id');
    const thumb = ep.thumbnail_url || ep.thumbnail || '';
    const epId  = `ep-${num}`;

    return `
      <div class="ep-item" id="${epId}" onclick="playEpisode(${num})">
        ${thumb
          ? `<div class="ep-thumb"><img src="${thumb}" alt="Ep ${num}" loading="lazy"></div>`
          : `<div class="ep-thumb-placeholder">▶</div>`}
        <div class="ep-num">${num}</div>
        <div class="ep-title" title="${title}">${title}</div>
        ${hasSub ? `<span class="ep-sub-badge">SUB ID</span>` : ''}
        <i class="bi bi-play-circle-fill ep-play-icon"></i>
      </div>`;
  }).join('');
}

/* ── FILTER EPISODES ── */
function filterEpisodes() {
  const q = document.getElementById('epSearch').value.toLowerCase().trim();
  filteredEps = q
    ? allEpisodes.filter(ep => {
        const t = (ep.title || ep.name || '').toLowerCase();
        const n = String(ep.episode_number || ep.number || ep.id || '');
        return t.includes(q) || n.includes(q);
      })
    : allEpisodes;
  renderEpisodeList(filteredEps);
  // Re-highlight active
  if (currentEpNum !== null) {
    const el = document.getElementById(`ep-${currentEpNum}`);
    if (el) el.classList.add('active');
  }
}

/* ════════════════════════════════════════════
   EMBED SERVERS — pakai MAL ID + episode num
   Tidak butuh API key, langsung jalan.
════════════════════════════════════════════ */
// ═══════════════════════════════════════════════
// Server embed — pakai MAL ID, tidak butuh API key
// URL format diverifikasi dari docs resmi masing-masing
// ═══════════════════════════════════════════════
const EMBED_SERVERS = [
  {
    label: '🟣 Server 1',
    // vidsrc.to — format: /embed/anime/{mal_id}/{ep_num}
    getUrl: (malId, ep) => `https://vidsrc.to/embed/anime/${malId}/${ep}`,
    hasSub: true
  },
  {
    label: '🔵 Server 2',
    // vidsrc.me — format: /embed/anime/{mal_id}/{ep_num}
    getUrl: (malId, ep) => `https://vidsrc.me/embed/anime/${malId}/${ep}`,
    hasSub: true
  },
  {
    label: '🟢 Server 3',
    // vidsrc.in — format: /embed/anime?malId={id}&ep={ep}
    getUrl: (malId, ep) => `https://vidsrc.in/embed/anime?malId=${malId}&ep=${ep}`,
    hasSub: true
  },
  {
    label: '🟡 Server 4',
    // anime.nexplay.it — format: /?malid={id}&ep={ep}
    getUrl: (malId, ep) => `https://anime.nexplay.it/?malid=${malId}&ep=${ep}`,
    hasSub: true
  },
  {
    label: '🟠 Server 5',
    // player.smashy.stream — format: /anime/{mal_id}?ep={ep}
    getUrl: (malId, ep) => `https://player.smashy.stream/anime/${malId}?ep=${ep}`,
    hasSub: false
  }
];

let activeServerIdx = 0;

/* ── PLAY EPISODE ── */
async function playEpisode(epNum) {
  // Highlight in sidebar
  document.querySelectorAll('.ep-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById(`ep-${epNum}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  currentEpNum = epNum;
  activeServerIdx = 0;

  showPlayerLoader(true);
  setSubStatus('loading');

  // Render server tabs
  renderEmbedServerTabs(epNum);

  // Play with first embed server
  loadEmbedPlayer(ANIME_ID, epNum, 0);

  // Try SPlay in background (for HLS option) — fire and forget
  trySPlayStream(epNum);

  // Save history
  saveHistory({ episode_number: epNum });
}

/* ── LOAD EMBED PLAYER ── */
function loadEmbedPlayer(malId, epNum, serverIdx) {
  const server = EMBED_SERVERS[serverIdx] || EMBED_SERVERS[0];
  const embedUrl = server.getUrl(malId, epNum);

  const embedPlayer = document.getElementById('embedPlayer');
  const videoPlayer = document.getElementById('mainPlayer');
  const placeholder = document.getElementById('playerPlaceholder');

  // Hide video, show iframe
  videoPlayer.style.display = 'none';
  placeholder.style.display = 'none';
  embedPlayer.style.display = 'block';
  embedPlayer.src = embedUrl;

  showPlayerLoader(false);
  setSubStatus(server.hasSub ? 'active' : 'available');

  // Highlight active tab
  document.querySelectorAll('.server-btn').forEach((b, i) => {
    b.classList.toggle('active', i === serverIdx);
  });
  activeServerIdx = serverIdx;
}

/* ── LOAD STREAM DARI SPLAY (utama) ── */
async function trySPlayStream(epNum) {
  // Dapatkan slug SPlay dari title anime
  const slug = await getSplaySlug(TITLE, ANIME_ID);
  if (!slug) {
    console.warn('Tidak dapat slug SPlay, embed player tetap aktif');
    return;
  }

  try {
    // Per SPlay docs: GET /api/anime/{slug}/episodes/{number}
    // Returns: signed HLS URL + subtitle tracks
    const res = await splayFetch(`/api/anime/${slug}/episodes/${epNum}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // Response shape from OpenAPI: episode with video_url, qualities, subtitle_url
    const ep = data.data || data;

    // Handle both possible response shapes
    let sources = [];
    if (ep.qualities && typeof ep.qualities === 'object') {
      // { qualities: { "1080p": "url", "720p": "url" } }
      sources = Object.entries(ep.qualities).map(([q, url]) => ({
        quality: q, url, type: url.includes('.m3u8') ? 'hls' : 'mp4'
      }));
    } else if (ep.video_url) {
      sources = [{ quality: 'Auto', url: ep.video_url, type: ep.video_url.includes('.m3u8') ? 'hls' : 'mp4' }];
    } else if (ep.sources) {
      sources = ep.sources;
    }

    const subs = ep.subtitle_tracks || ep.subtitles ||
      (ep.subtitle_url ? [{ url: ep.subtitle_url, language: 'id', label: 'Indonesia' }] : []);

    if (!sources.length) {
      console.warn('SPlay tidak ada sumber video untuk ep', epNum);
      return;
    }

    console.log(`✅ SPlay stream tersedia: ${sources.length} sumber`);
    currentSources = sources;

    // Tampilkan subtitle Indonesia jika ada
    if (subs.length) {
      handleSubtitles(subs);
      const idSub = subs.find(s =>
        (s.language||s.lang||'').toLowerCase() === 'id' ||
        (s.label||'').toLowerCase().includes('indo')
      );
      setSubStatus(idSub ? 'active' : 'available');
    }

    // Tambahkan tombol SPlay HLS ke server tabs
    const tabs = document.getElementById('serverTabs');
    sources.slice(0, 3).forEach((src, i) => {
      const label = src.quality || (src.type === 'hls' ? 'HLS' : 'MP4') || `SPlay ${i+1}`;
      const btn = document.createElement('button');
      btn.className = 'server-btn';
      btn.style.cssText = 'border-color:#7250dc;color:#b09ef5;';
      btn.innerHTML = `⚡ ${label}`;
      btn.onclick = () => {
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Switch dari iframe ke native video player
        const embedPlayer = document.getElementById('embedPlayer');
        embedPlayer.style.display = 'none';
        embedPlayer.src = '';
        showPlayerLoader(true);
        playSource(src);
      };
      tabs.appendChild(btn);
    });

    // Jika sumber HLS ada → langsung switch ke native player (kualitas lebih baik)
    const hlsSrc = sources.find(s => s.type === 'hls' || (s.url||'').includes('.m3u8'));
    if (hlsSrc) {
      console.log('✅ Auto-switch ke SPlay HLS player');
      const embedPlayer = document.getElementById('embedPlayer');
      embedPlayer.style.display = 'none';
      embedPlayer.src = '';
      showPlayerLoader(true);
      // Tandai tombol pertama SPlay sebagai aktif
      setTimeout(() => {
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        const splayBtns = [...tabs.querySelectorAll('.server-btn')].filter(b => b.textContent.includes('⚡'));
        if (splayBtns[0]) splayBtns[0].classList.add('active');
      }, 100);
      await playSource(hlsSrc);
    }

  } catch(e) {
    console.warn('SPlay stream gagal:', e.message, '— embed player tetap aktif');
  }
}

/* ── RENDER EMBED SERVER TABS ── */
function renderEmbedServerTabs(epNum) {
  const tabs = document.getElementById('serverTabs');
  tabs.innerHTML = EMBED_SERVERS.map((s, i) =>
    `<button class="server-btn ${i===0?'active':''}" onclick="loadEmbedPlayer('${ANIME_ID}', ${epNum}, ${i})">${s.label}</button>`
  ).join('');
}

async function switchSource(idx, btn) {
  // Legacy for HLS sources
  document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentSources[idx]) {
    showPlayerLoader(true);
    await playSource(currentSources[idx]);
  }
}

/* ── HANDLE SUBTITLES ── */
function handleSubtitles(subs) {
  const player = document.getElementById('mainPlayer');
  // Remove old tracks
  while (player.firstChild) player.removeChild(player.firstChild);

  if (!subs || !subs.length) {
    setSubStatus('none');
    return;
  }

  // Find Indonesian subtitle
  const idSub = subs.find(s =>
    (s.language || s.lang || '').toLowerCase() === 'id' ||
    (s.label || '').toLowerCase().includes('indo') ||
    (s.label || '').toLowerCase().includes('indonesia')
  );

  subs.forEach(sub => {
    const track = document.createElement('track');
    track.kind  = 'subtitles';
    track.label = sub.label || sub.language || sub.lang || 'Subtitle';
    track.srclang = sub.language || sub.lang || 'id';
    track.src   = sub.url || sub.file || sub.src || '';
    if (idSub && sub === idSub) {
      track.default = true;
      track.mode    = 'showing';
    }
    player.appendChild(track);
  });

  setSubStatus(idSub ? 'active' : 'available');
}

function setSubStatus(state) {
  const el = document.getElementById('subStatus');
  if (state === 'loading') {
    el.className = 'sub-notice';
    el.innerHTML = `<i class="bi bi-badge-cc"></i> Sub ID: Memeriksa...`;
  } else if (state === 'active') {
    el.className = 'sub-notice active';
    el.innerHTML = `<i class="bi bi-badge-cc-fill"></i> Sub Indonesia Aktif ✓`;
  } else if (state === 'available') {
    el.className = 'sub-notice';
    el.innerHTML = `<i class="bi bi-badge-cc"></i> Subtitle Tersedia`;
  } else {
    el.className = 'sub-notice';
    el.innerHTML = `<i class="bi bi-badge-cc"></i> Tanpa Subtitle`;
    el.style.opacity = '.5';
  }
}

/* ── PLAY SOURCE WITH HLS.JS (used for SPlay HLS) ── */
async function playSource(source) {
  const player      = document.getElementById('mainPlayer');
  const placeholder = document.getElementById('playerPlaceholder');
  const embedPlayer = document.getElementById('embedPlayer');

  // Switch from embed to native player
  embedPlayer.style.display = 'none';
  embedPlayer.src = '';

  // Destroy old HLS instance
  if (hls) { hls.destroy(); hls = null; }

  const url     = source.url || source.src || source.stream_url || '';
  const isM3U8  = source.type === 'hls' || url.includes('.m3u8');
  const headers = source.headers || {};

  if (isM3U8 && Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30,
      enableWorker: true,
      xhrSetup: (xhr) => {
        if (headers.Referer)   xhr.setRequestHeader('Referer', headers.Referer);
        if (headers.Origin)    xhr.setRequestHeader('Origin', headers.Origin);
        if (headers.UserAgent) xhr.setRequestHeader('User-Agent', headers.UserAgent);
      }
    });
    hls.loadSource(url);
    hls.attachMedia(player);

    await new Promise((resolve, reject) => {
      hls.on(Hls.Events.MANIFEST_PARSED, () => resolve());
      hls.on(Hls.Events.ERROR, (e, d) => {
        if (d.fatal) reject(new Error(`HLS fatal: ${d.type}`));
      });
      setTimeout(() => reject(new Error('Timeout')), 15000);
    });

    showPlayerLoader(false);
    placeholder.style.display = 'none';
    player.style.display = 'block';
    player.play().catch(() => {});

  } else if (player.canPlayType('application/vnd.apple.mpegurl') || !isM3U8) {
    // Native HLS (Safari) or MP4
    player.src = url;
    player.style.display = 'block';
    placeholder.style.display = 'none';
    showPlayerLoader(false);
    player.play().catch(() => {});

  } else {
    showPlayerLoader(false);
    showPlayerError('Format video tidak didukung oleh browser ini. Coba browser lain.');
  }
}

/* ── UI HELPERS ── */
function showPlayerLoader(show) {
  const loader = document.getElementById('playerLoader');
  loader.classList.toggle('show', show);
}

function showPlayerError(msg) {
  const placeholder = document.getElementById('playerPlaceholder');
  const player = document.getElementById('mainPlayer');
  player.style.display = 'none';
  placeholder.style.display = 'flex';
  placeholder.innerHTML = `
    <i class="bi bi-exclamation-circle" style="color:rgba(230,57,70,.5)"></i>
    <p>${msg}</p>`;
}

function showEpError(msg) {
  document.getElementById('epList').innerHTML = `
    <div class="p-3">
      <div class="status-note err mb-3"><i class="bi bi-exclamation-triangle me-2"></i>${msg}</div>
    </div>`;
}

/* ── WATCHLIST / HISTORY ── */
function saveWatchlist(anime) {
  try {
    let list = JSON.parse(localStorage.getItem('av_watchlist') || '[]');
    if (!list.some(a => a.id === anime.id)) {
      list.unshift({ id: anime.id, name: anime.name, cover_url: anime.cover_url, score: anime.anilist_data?.averageScore, saved_at: new Date().toISOString() });
      localStorage.setItem('av_watchlist', JSON.stringify(list));
      alert('✅ Ditambahkan ke watchlist!');
    } else {
      alert('⭐ Anime ini sudah ada di watchlist kamu.');
    }
  } catch(e) {}
}

function saveHistory(ep) {
  try {
    let hist = JSON.parse(localStorage.getItem('av_history') || '[]');
    hist = hist.filter(h => h.id !== ANIME_ID);
    hist.unshift({ id: ANIME_ID, title: TITLE, ep_num: currentEpNum, image: ep.thumbnail_url || '', viewed_at: new Date().toISOString() });
    hist = hist.slice(0, 50);
    localStorage.setItem('av_history', JSON.stringify(hist));
  } catch(e) {}
}

init();
</script>
